[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py loaddata fixtures/seed_data.json || true && python manage.py shell -c \"import os; from django.contrib.auth import get_user_model; U=get_user_model(); u=os.environ.get('DJANGO_SUPERUSER_USERNAME','admin'); U.objects.filter(username=u).exists() or U.objects.create_superuser(u, os.environ.get('DJANGO_SUPERUSER_EMAIL',''), os.environ.get('DJANGO_SUPERUSER_PASSWORD',''))\" && gunicorn api.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
healthcheckPath = "/health/"
restartPolicyType = "on_failure"
