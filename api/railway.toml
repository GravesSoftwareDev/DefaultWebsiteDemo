[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate --noinput && gunicorn api.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
healthcheckPath = "/endpoints/products/"
restartPolicyType = "on_failure"
